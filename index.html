<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooftop Ninja Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hud">
      <div>
        <p class="eyebrow">Endless Runner Prototype</p>
        <h1>Rooftop Ninja Run</h1>
      </div>
      <div class="scoreboard">
        <div class="score-card">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
      </div>
    </section>

    <section class="game-wrap">
      <canvas id="game" width="960" height="540" aria-label="Rooftop Ninja Run game area"></canvas>

      <div class="overlay" id="overlay">
        <p class="overlay-tag">Night chase over Neo Karachi</p>
        <h2 id="overlay-title">Press Space to Start</h2>
        <p id="overlay-text">Jump over drones, vault rooftop gaps, and keep the chase alive.</p>
        <div class="controls">
          <span>Jump: <kbd>Space</kbd> / <kbd>W</kbd> / <kbd>↑</kbd></span>
          <span>Restart: <kbd>R</kbd></span>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
